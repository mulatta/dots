<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      The page is bundled and loaded from app resources; the CSP blocks
      every network fetch. style-src 'unsafe-inline' exists only for the
      <style> elements Mermaid injects into its rendered SVG.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: nostr-chat-media:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nostr-chat-bar history</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
