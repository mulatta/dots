[project]
name = "slack-manifest-cli"
version = "0.1.0"
description = "Manage Slack app manifests from YAML or JSON files"
requires-python = ">=3.13"
dependencies = ["PyYAML>=6.0"]

[project.scripts]
slack-manifest = "slack_manifest_cli.main:main"

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["slack_manifest_cli*"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "RUF"]

[tool.mypy]
python_version = "3.13"
strict = true
