#:schema https://yazi-rs.github.io/schemas/yazi.json

# Only overrides live here; yazi merges these over its built-in defaults.
# A full default dump breaks on every schema change (see yazi 26.x: $schema
# key, fetchers `group`, renamed task workers).

[mgr]
ratio = [2, 4, 3]
show_hidden = true

[preview]
max_width = 1200
max_height = 1000

# Custom previewers via the `piper` plugin (prepend = take priority over defaults).
[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'
[[plugin.prepend_previewers]]
url = "*.csv"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.tar*"
run = 'piper --format=url -- tar tf "$1"'
[[plugin.prepend_previewers]]
url = "*.log"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.{conf,config,cfg,ini,toml,yaml,yml}"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.{sh,bash,zsh,fish}"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.py"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.json"
run = 'piper -- jq . "$1" 2>/dev/null || bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "*.xml"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = "Dockerfile*"
run = 'piper -- bat -p --color=always "$1"'
[[plugin.prepend_previewers]]
url = ".git*"
run = 'piper -- bat -p --color=always "$1"'

# Fallback hex preview for everything else.
[[plugin.append_previewers]]
url = "*"
run = 'piper -- hexyl --border=none --terminal-width=$w "$1"'
