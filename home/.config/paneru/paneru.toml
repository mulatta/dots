[bindings]
quit = "ctrl + alt - q"
window_center = "alt - c"
window_focus_east = "alt + ctrl - l"
window_virtual_north = "alt + ctrl - k"
window_virtual_south = "alt + ctrl - j"
window_focus_west = "alt + ctrl - h"
window_fullwidth = "alt - m"
window_manage = "alt - f"
window_nextdisplay = "alt - n"
window_nextdisplaysend = "alt + shift - n"
window_resize = "alt - r"
window_shrink = "alt + shift - r"
window_swap_east = "alt + shift - l"
window_virtualmove_north = "alt + shift - k"
window_virtualmove_south = "alt + shift - j"
window_swap_west = "alt + shift - h"

[options]
animation_speed = 14.0
focus_follows_mouse = true
mouse_follows_focus = false
preset_column_widths = [0.25, 0.33, 0.5, 0.66, 0.75]
