set -g mouse on
set -g set-titles on
set-option -g set-titles-string "#H"

bind-key -n WheelUpPane \
    if-shell -Ft= "#{?pane_in_mode,1,#{mouse_button_flag}}" \
        "send-keys -M" \
        "if-shell -Ft= '#{alternate_on}' \
            'send-keys Up Up Up' \
            'copy-mode'"

bind-key -n WheelDownPane \
    if-shell -Ft= "#{?pane_in_mode,1,#{mouse_button_flag}}" \
        "send-keys -M" \
        "send-keys Down Down Down"

# jump to last prompt
bind-key -T copy-mode-vi [ send-keys -X previous-prompt
bind-key -T copy-mode-vi ] send-keys -X next-prompt

# sync tmux buffer with terminal clipboard
set -g set-clipboard on
unbind f
set -g @thumbs-key f
set -g @thumbs-command "command -v xdg-open && xdg-open {} || command -v open && open {}"
set -g @thumbs-upcase-command "tmux set-buffer -w -- {} && tmux paste-buffer"
# catppuccin-macchiato palette
set -g @thumbs-bg-color '#5b6078'
set -g @thumbs-fg-color '#cad3f4'
set -g @thumbs-hint-bg-color '#eed49f'
set -g @thumbs-hint-fg-color '#181926'
set -g @thumbs-select-bg-color '#8aadf4'
set -g @thumbs-select-fg-color '#181926'
set -g @thumbs-contrast 1
set -g @thumbs-unique 1
set -g @thumbs-reverse enabled
# match sri und sha256 hashes for nix
set -g @thumbs-regexp-1 '(sha256-[0-9a-zA-z=/+]{44}|[0-9a-f]{7,40}|[0-9a-z]{52})'
run-shell ~/.nix-profile/share/tmux-plugins/tmux-thumbs/tmux-thumbs.tmux

# allow passing through escape sequences (OSC 52 clipboard, kitty graphics, etc.)
set -g allow-passthrough on

# extended keys for proper modifier key forwarding (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys on
set -g extended-keys-format csi-u

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Default command: pin the user's login shell so the first window's name
# becomes 'zsh' (or whatever the SHELL is) rather than 'tmux' when tmux is
# launched directly. Combined with automatic-rename, the window label tracks
# the foreground command.
set -g default-command "${SHELL}"
setw -g automatic-rename on

# increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# refresh 'status-left' and 'status-right' more often
set -g status-interval 5

# upgrade $TERM to advertise truecolor + hyperlinks to inner TUIs
set -g default-terminal 'tmux-256color'
set-option -sa terminal-overrides ",*:Tc"
set -ga terminal-features "*:hyperlinks"

# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# focus events: lets inner TUIs (Ink/ratatui/pi-tui) pause animations on
# inactive panes, reducing redraw storms.
set -g focus-events on

# super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# vi-style controls for copy mode (closest match to helix's modal feel)
setw -g mode-keys vi

# Prefix key — C-Space matches sesh's recommended setup and avoids
# Emacs/readline conflicts on C-b.
unbind C-b
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

# confirm before killing a window or the server
unbind -T prefix q
bind-key q confirm kill-window
bind-key Q confirm kill-server

# Pane navigation — vim-style hjkl. Each prefix press moves once.
# Replaces the default arrow-key bindings in spirit, though the arrows still
# work as a fallback.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Styles the active pane border. Helps when you have
# more than two panes.
set-option -g renumber-windows on

set -g visual-activity on

# start window indexing at one instead of zero
set -g base-index 1

# Use vim keybindings in copy mode
setw -g mode-keys vi

set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_AUTH_SOCK SSH_CONNECTION SSH_TTY WINDOWID XAUTHORITY TERM UPTERM_ADMIN_SOCKET'

# keep working directory in new panes, windows, and sessions
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind -N "new session in current directory" a new-session -c "#{pane_current_path}"

set-option -g set-clipboard on

# sesh: smart tmux session manager (zoxide + tmux sessions + configs)
# https://github.com/joshmedeski/sesh#recommended-tmux-settings
set -g detach-on-destroy off  # don't exit tmux when closing a session (protects parent on workmux merge)
bind-key x kill-pane          # skip "kill-pane 1? (y/n)" prompt

bind-key s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^x zoxide ^w workmux ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-w:change-prompt(🌳  )+reload(cd \"#{pane_current_path}\" && workmux list --json | jq -r \".[].path\")' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
# Old choose-tree still reachable for when sesh/fzf misbehave.
bind-key S choose-tree -Zs

bind -N "last-session (via sesh)" L run-shell "sesh last"
bind -N "switch to root session (via sesh)" 9 run-shell "sesh connect --root '#{pane_current_path}'"

# workmux dashboard popup (sidebar alternative — on-demand, no permanent screen real estate)
bind C-s display-popup -h 30 -w 100 -E "workmux dashboard"
bind C-w display-popup -h 30 -w 100 -E "workmux dashboard --tab worktrees"

bind R run "echo \"stty columns $(tmux display -p \#{pane_width}); stty rows $(tmux display -p \#{pane_height})\" | tmux load-buffer - ; tmux paste-buffer"

## Single-row status bar — zjstatus-aligned, catppuccin-macchiato palette.
# Layout mirrors zjstatus on the zellij side:
#   left:  mode pill (left square, right rounded) — flush left
#   tabs:  catppuccin-style two-segment pills, packed left after the mode pill
#   right: datetime + weather (plain gray text, like zjstatus pane 2),
#          then mail pill (peach), then session pill (surface1).
# No host display — this dotfile is a single-host setup.
set -g status-position top
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 200

# Macchiato palette:
#   base #24273a  mantle #1e2030  crust #181926
#   surface0 #363a4f  surface1 #494d64  overlay0 #6e738d
#   text #cad3f4  subtext1 #b8c0e0
#   green #a6da95  blue #8aadf4  peach #f5a97f  red #ed8796
#   teal #8bd5ca  yellow #eed49f  gray #6C7086 (zjstatus datetime/weather color)
set -g mode-style 'fg=#8aadf4,bg=#363a4f'
set -g message-style 'fg=#8aadf4,bg=#24273a'
set -g message-command-style 'fg=#8aadf4,bg=#24273a'
set -g pane-border-style 'fg=#363a4f'
set -g pane-active-border-style 'fg=#8aadf4'
set -g status-style 'fg=#cad3f4,bg=default'

setw -g window-status-separator ' '
setw -g window-status-style 'NONE,fg=#cad3f4,bg=#24273a'
setw -g window-status-activity-style 'underscore,fg=#eed49f,bg=#24273a'

# Tabs — direct port of zjstatus tab_normal/tab_active. Two-segment pill
# with both rounded caps: index segment (color bg, mantle fg, bold) +
# name segment (surface0 bg, color fg, bold). Inactive teal, active yellow.
setw -g window-status-format       '#[bg=#24273a,fg=#8bd5ca]#[bg=#8bd5ca,fg=#1e2030,bold]#I #[bg=#363a4f,fg=#8bd5ca,bold] #W #[bg=#24273a,fg=#363a4f,bold]'
setw -g window-status-current-format '#[bg=#24273a,fg=#eed49f]#[bg=#eed49f,fg=#1e2030,bold]#I #[bg=#363a4f,fg=#eed49f,bold] #W #[bg=#24273a,fg=#363a4f,bold]'

# status-left: mode pill — left square (no ), right rounded ().
# Mode color rotates with state — direct port of zjstatus mode_normal /
# mode_tmux / mode_scroll, plus a SYNC entry that has no zellij counterpart:
#   NORMAL  green   (zjstatus mode_normal)
#   PREFIX  peach   (zjstatus mode_tmux — the tmux-compat color)
#   COPY    blue    (zjstatus mode_scroll)
#   SYNC    red     (added — synchronize-panes is a danger signal)
set -g status-left '#{?pane_synchronized,#[bg=#ed8796]#[fg=#181926]#[bold] SYNC #[bg=#24273a]#[fg=#ed8796],#{?client_prefix,#[bg=#f5a97f]#[fg=#181926]#[bold] PREFIX #[bg=#24273a]#[fg=#f5a97f],#{?pane_in_mode,#[bg=#8aadf4]#[fg=#181926]#[bold] COPY #[bg=#24273a]#[fg=#8aadf4],#[bg=#a6da95]#[fg=#181926]#[bold] NORMAL #[bg=#24273a]#[fg=#a6da95]}}} '

# status-right: datetime + weather (plain gray, zjstatus pane 2 style),
# then mail pill (collapses when zero), then session pill on the far right.
set -g status-right '#[fg=#6C7086,bold]%m/%d %H:%M  #[fg=#6C7086,bold]#(tmux-weather)  #(tmux-status-mail) #[bg=#24273a,fg=#494d64]#[bg=#494d64,fg=#cad3f4,bold] #S #[bg=#24273a,fg=#494d64]'

## Pane frame approximation — zjstatus의 frame 효과를 tmux 한계 안에서 흉내.
# tmux는 zellij처럼 pane을 4-side frame으로 둘러쌀 수 없음 (plugin pane 시스템
# 부재). 가까운 효과는 세 가지의 조합:
#   1. window-active-style vs window-style: active pane의 bg가 ghostty 배경과
#      일치, inactive pane은 살짝 어두움 → 활성 영역 시각적 강조
#   2. pane-border-indicators off: default 'colour'는 active 측 절반만 색칠
#      → 세로 분할 시 line이 위/아래 절반씩 다른 색으로 보이는 문제 해결
#   3. pane-border-status top + format: 각 pane 위에 인덱스+명령+active 표시
#      한 줄 추가 → 상단 frame
# Both styles left at 'default' so ghostty's background-opacity / blur
# stays visible across all panes. Active-pane indication is delegated to
# the heavy border line + pane-border-status header below.
set -g window-style 'default'
set -g window-active-style 'default'

set -g pane-border-indicators off
set -g pane-border-lines heavy

set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=#8aadf4#,bold],#[fg=#8087a2]}#P #{?pane_active,▎ ,│ }#{pane_current_command} '
